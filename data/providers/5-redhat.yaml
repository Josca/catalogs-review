provider:
  name: Red Hat Ecosystem Catalog
  short_name: redhat
  url: https://catalog.redhat.com/en/search?searchType=Software&type=Containerized+application
  description: The Red Hat Ecosystem Catalog provides certified containerized applications for Red Hat OpenShift and Red Hat
    Enterprise Linux. Applications undergo Red Hat's certification process ensuring compatibility, security, and enterprise
    readiness across Red Hat platforms.
  certification_process: Applications must pass Red Hat's certification pipeline including automated testing, security vulnerability
    scanning, container image verification, and compliance with Red Hat platform deployment standards. Certified applications
    receive the 'Certified by Red Hat' badge.
  support_model: Enterprise support provided through Red Hat subscription. Certified applications are backed by the ISV partner
    with Red Hat coordinating support. Available via Red Hat Customer Portal with SLA-based response times.
  security:
    scanning: Automated vulnerability scanning via Red Hat container health index
    signing: Container images signed and verified through Red Hat's signing infrastructure
    cve_response: Red Hat Security Advisories (RHSA) issued for critical CVEs
  update_cadence: Continuous — applications updated as vendors submit new certified versions
  oci_support: true
  licensing: Red Hat subscription required for full support; individual app licenses vary by vendor
