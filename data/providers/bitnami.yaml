provider:
  name: "Bitnami (Broadcom)"
  short_name: "bitnami"
  url: "https://bitnami.com/stacks/helm"
  description: >
    Bitnami, now part of Broadcom (via VMware acquisition), maintains one of the largest
    curated Helm chart catalogs. Charts are continuously built, tested, and updated with
    the latest application versions and security patches. Widely adopted across enterprise
    and community Kubernetes deployments.
  certification_process: >
    Charts go through Bitnami's automated CI/CD pipeline including multi-platform builds,
    automated functional testing, container image hardening (non-root, minimal base images),
    and CIS benchmark compliance. Each chart release is tested against multiple Kubernetes
    versions. Bitnami follows a "continuously updated" model where charts are rebuilt
    whenever upstream app versions or base images change.
  support_model: >
    Community support via GitHub issues for open-source charts. Enterprise support available
    through VMware Tanzu / Broadcom support agreements. Bitnami Premium offers SLA-backed
    support, custom image builds, and dedicated assistance.
  security:
    scanning: "Automated daily vulnerability scanning with Trivy and Grype; container images rebuilt on CVE detection"
    signing: "Charts and images signed with Cosign; SBOM (Software Bill of Materials) provided for all images"
    cve_response: "Automated rebuild pipeline triggers on CVE detection; critical CVEs typically patched within 24-48 hours"
  update_cadence: "Continuous — charts rebuilt automatically when upstream releases new versions or CVEs are detected; typically multiple updates per week per chart"
  oci_support: true
  licensing: "Open source (Apache 2.0) for charts and community images; Bitnami Premium requires commercial license"

