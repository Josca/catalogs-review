provider:
  name: "Red Hat"
  short_name: "redhat"
  url: "https://catalog.redhat.com/software/helm-charts"
  description: >
    Red Hat provides certified Helm charts through the Red Hat Ecosystem Catalog,
    specifically designed for OpenShift Container Platform. Charts undergo a rigorous
    certification process ensuring compatibility, security, and enterprise readiness.
  certification_process: >
    Charts must pass Red Hat's certification pipeline which includes automated testing,
    security vulnerability scanning, container image verification against Red Hat's
    container health index, and compliance with OpenShift deployment standards.
    Only charts meeting all criteria receive the "Red Hat Certified" badge.
  support_model: >
    Enterprise support provided through Red Hat subscription. Certified charts are
    backed by the chart vendor with Red Hat acting as a coordination point for issues.
    Support available via Red Hat Customer Portal with SLA-based response times.
  security:
    scanning: "Automated vulnerability scanning via Red Hat container health index and Clair-based image scanning"
    signing: "Charts and container images are signed; provenance verified through Red Hat's signing infrastructure"
    cve_response: "Red Hat Security Advisories (RHSA) issued for critical CVEs; typically patched within 1-5 business days for critical issues"
  update_cadence: "Charts updated in alignment with OpenShift release cycles (approximately quarterly major updates, monthly patch updates)"
  oci_support: true
  licensing: "Red Hat subscription required for full support; community access available through OperatorHub"

