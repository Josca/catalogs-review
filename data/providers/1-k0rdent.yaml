provider:
  name: k0rdent
  short_name: k0rdent
  url: https://catalog.k0rdent.io/latest/
  description: 'k0rdent provides a curated catalog of Helm charts for Kubernetes cluster management, covering applications,
    infrastructure providers, and solution stacks. The catalog includes community-supported, partner, and enterprise-grade
    charts with a focus on cloud-native infrastructure, AI/ML workloads, and platform engineering.

    '
  certification_process: 'Charts are curated and validated for compatibility with k0rdent-managed Kubernetes clusters. Each
    addon includes metadata with support type classification (community, partner, or enterprise), versioned chart and app
    versions, and documentation links.

    '
  support_model: 'Three-tier support model: community charts with community-driven support, partner charts backed by ISV partners
    (e.g. Datadog, Tetrate, NVIDIA Run:ai), and enterprise charts with commercial support from Mirantis and other enterprise
    vendors.

    '
  security:
    scanning: Charts include versioned container images with known provenance
    signing: Catalog metadata includes chart repository URLs and version pinning
    cve_response: Dependent on individual chart maintainers; enterprise charts follow vendor SLA timelines
  update_cadence: Catalog updated with each k0rdent release; individual charts updated independently
  oci_support: true
  licensing: Open source catalog; individual charts have their own licenses; enterprise charts require vendor agreements
  chart_url_template: https://catalog.k0rdent.io/latest/apps/{name}/
