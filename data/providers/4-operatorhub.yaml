provider:
  name: OperatorHub
  short_name: operatorhub
  url: https://operatorhub.io/
  description: OperatorHub.io is a community-driven catalog of Kubernetes Operators. It provides a central registry for discovering
    and sharing Operators that manage complex applications on Kubernetes, built on the Operator Framework.
  certification_process: Operators are submitted via the community-operators GitHub repository. Submissions undergo automated
    CI checks including bundle validation, scorecard tests, and metadata verification. Community review is required before
    inclusion.
  support_model: Community-supported catalog. Individual operators may have commercial support from their vendors. No centralized
    enterprise support — support varies by operator provider.
  security:
    scanning: Operators undergo basic validation during submission; security scanning depends on individual operator maintainers
    signing: No centralized chart signing; individual operators may implement their own signing
    cve_response: CVE response is the responsibility of individual operator maintainers; no centralized SLA
  update_cadence: Continuous — operators are updated as maintainers submit new versions via GitHub PRs
  oci_support: true
  licensing: Open source (Apache 2.0) for the catalog; individual operators have their own licenses
  chart_url_template: https://operatorhub.io/operator/{name}
