provider:
  name: SUSE Rancher
  short_name: suse-rancher
  url: https://apps.rancher.io/applications?type=helm_chart
  description: 'SUSE Rancher provides curated and validated Helm charts through the Rancher Application Collection and partner
    chart repositories. Charts are tested for compatibility with Rancher-managed Kubernetes clusters and RKE2/K3s distributions.

    '
  certification_process: 'Charts undergo validation testing against SUSE''s supported Kubernetes distributions (RKE2, K3s).
    Partner charts are reviewed for security compliance, Kubernetes best practices, and integration with Rancher''s multi-cluster
    management. SUSE maintains a curated application collection with charts verified for enterprise deployment.

    '
  support_model: 'Enterprise support available through SUSE subscription plans. Partner charts receive coordinated support
    between SUSE and the ISV partner. SUSE provides L1/L2 support with escalation to partners for application-specific issues.

    '
  security:
    scanning: Container images scanned via SUSE NeuVector for vulnerabilities and compliance
    signing: Charts signed with Cosign; container images verified through SUSE's supply chain security
    cve_response: SUSE Security Advisories issued for tracked CVEs; critical vulnerabilities addressed within published SLA
      timelines
  update_cadence: Charts updated alongside Rancher releases (approximately every 6-8 weeks for minor releases, patches as
    needed)
  oci_support: true
  licensing: SUSE subscription required for enterprise support; Rancher itself is open source (Apache 2.0)
  chart_url_template: https://apps.rancher.io/applications/{name}
